name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  KYBRA_VERSION: "0.7.1"
  DFX_VERSION: "0.32.0"

jobs:
  # ── Fast, hermetic: pure-Python unit tests (no replica, no wasm) ──────────
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install pyre + pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .

      - name: Run unit tests
        run: pytest tests/ -q --ignore=tests/pocketic

  # ── Slow, best-effort: build one canister with Kybra, run the size gate ──
  # First run is ~30 min (Kybra bootstraps its own Rust toolchain into
  # ~/.config/kybra and compiles the interpreter); later runs are fast thanks
  # to the caches below. NOTE: written defensively but only validated by a
  # real push — dfx-on-runner behavior can't be exercised locally.
  wasm-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      # Kybra installs its own Rust toolchain + build caches under
      # ~/.config/kybra on first build; ~/.cargo holds registry caches.
      # Caching both takes rebuilds from ~30 min to a few minutes.
      - name: Cache Kybra toolchain and cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.config/kybra
            ~/.cargo
          key: kybra-${{ env.KYBRA_VERSION }}-${{ runner.os }}-${{ hashFiles('dfx.json') }}
          restore-keys: |
            kybra-${{ env.KYBRA_VERSION }}-${{ runner.os }}-

      - name: Install dfx via dfxvm
        run: |
          DFXVM_INIT_YES=true DFX_VERSION="${DFX_VERSION}" \
            sh -ci "$(curl -fsSL https://internetcomputer.org/install.sh)"
          # dfxvm installs to ~/.local/share/dfx/bin on Linux
          echo "$HOME/.local/share/dfx/bin" >> "$GITHUB_PATH"

      - name: Create deploy venv (kybra needs an ACTIVE venv at build time)
        run: |
          python -m venv venv
          . venv/bin/activate
          pip install --upgrade pip
          pip install "kybra==${KYBRA_VERSION}"
          pip install .
          python -m kybra install-dfx-extension

      - name: Build rest_api canister
        run: |
          . venv/bin/activate
          dfx --version
          dfx start --background --clean
          # deploy (not just build) so .dfx/local/canisters/rest_api/*.wasm.gz
          # — the artifact actually shipped to the network — exists too.
          dfx deploy rest_api
          dfx stop

      - name: Size / idle-burn gate (rest_api only — sole canister built here)
        run: CANISTERS=rest_api bash scripts/size_gate.sh

      - name: Upload wasm artifacts for pocketic job
        uses: actions/upload-artifact@v4
        with:
          name: rest_api-wasm
          path: |
            .kybra/rest_api/rest_api.wasm
            .kybra/rest_api/rest_api.did
            .dfx/local/canisters/rest_api/rest_api.wasm.gz
            .dfx/local/canisters/rest_api/service.did
          if-no-files-found: error

  # ── PocketIC integration tests against the built wasm ────────────────────
  # PENDING VALIDATION: the tests/pocketic harness is being developed in
  # parallel. Job skips gracefully if the directory doesn't exist yet.
  # Versions are pinned in scripts/pocketic_setup.sh (server 13.0.0,
  # pip pocket-ic==3.1.2 — keep in lockstep per dfinity/pocketic-py CHANGELOG).
  pocketic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: wasm-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Download built wasm
        uses: actions/download-artifact@v4
        with:
          name: rest_api-wasm
          # upload-artifact preserved paths relative to the workspace root, so
          # this restores .kybra/... and .dfx/local/canisters/... in place.
          path: .

      - name: Cache pocket-ic server binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/pocket-ic
          key: pocket-ic-13.0.0-${{ runner.os }}

      - name: Install pocket-ic server binary
        run: |
          # Downloads to ~/.cache/pocket-ic/<version>/pocket-ic (idempotent)
          # and prints an `export POCKET_IC_BIN=...` line last.
          eval "$(bash scripts/pocketic_setup.sh | tail -1)"
          echo "POCKET_IC_BIN=$POCKET_IC_BIN" >> "$GITHUB_ENV"

      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pocket-ic==3.1.2
          pip install -e .

      - name: Run pocketic tests
        run: |
          if [ -d tests/pocketic ]; then
            pytest tests/pocketic -q
          else
            echo "tests/pocketic not present yet (harness in development) — skipping"
          fi
