name: publish

# Publishes the `pyre-icp` distribution to PyPI when a GitHub release is
# published. `pyre-icp` exists on PyPI (owner: sweetpapatech; 1.1.x were
# uploaded with an API token). This workflow prefers TRUSTED PUBLISHING
# (OIDC) — one-time setup below; until that's configured, publish manually
# with `python -m build && twine upload dist/*` (token in ~/.pypirc).
#
# ── One-time setup to make this workflow work (recommended) ────────────────
# 1. https://pypi.org/manage/project/pyre-icp/settings/publishing/ →
#    "Add a new publisher":
#       Owner             : Sweet-Papa-Technologies
#       Repository name   : PYRE
#       Workflow name     : publish.yml
#       Environment name  : pypi
# 2. GitHub repo: Settings → Environments → create environment "pypi"
#    (optionally with required reviewers so a human approves each publish).
# Then: publishing = creating a GitHub release. Nothing to rotate, no
# long-lived secrets. `skip-existing` makes re-runs of already-uploaded
# versions succeed instead of erroring.

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Sanity-check the wheel ships the CLI templates
        run: |
          python -m zipfile -l dist/*.whl | grep "pyre/templates/bare-api/src/main.py"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment: pypi          # must match the trusted-publisher config on PyPI
    permissions:
      id-token: write          # required for PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
