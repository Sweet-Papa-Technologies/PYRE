name: publish

# Publishes the `pyre-icp` distribution to PyPI when a GitHub release is
# published. Uses PyPI TRUSTED PUBLISHING (OIDC) — no API token secrets.
#
# ── One-time setup required on PyPI (do this BEFORE the first release) ─────
# 1. Log in to https://pypi.org and go to
#    "Your projects" → "Publishing" (https://pypi.org/manage/account/publishing/).
# 2. Under "Add a new pending publisher" (the project `pyre-icp` doesn't exist
#    yet — trusted publishing will create it on first publish), enter:
#       PyPI Project Name : pyre-icp
#       Owner             : Sweet-Papa-Technologies
#       Repository name   : PYRE
#       Workflow name     : publish.yml
#       Environment name  : pypi
# 3. (Recommended) In the GitHub repo: Settings → Environments → create an
#    environment named "pypi" (optionally with required reviewers so a human
#    approves each publish).
# Then: create a GitHub release (tag e.g. v0.2.0) and this workflow publishes.

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Sanity-check the wheel ships the CLI templates
        run: |
          python -m zipfile -l dist/*.whl | grep "pyre/templates/bare-api/src/main.py"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment: pypi          # must match the trusted-publisher config on PyPI
    permissions:
      id-token: write          # required for PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
